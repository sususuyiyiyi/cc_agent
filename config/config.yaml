feishu:
  app_id: ''
  app_secret: ''
  enabled: true
  message:
    news_enabled: true
    review_enabled: true
    wellness_enabled: true
  webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook/e3990900-85a3-44b6-a025-9b7175b191a0
logging:
  backup_count: 5
  file: ./logs/cc_agent.log
  level: INFO
  max_size_mb: 10
preferences:
  news:
    categories:
    - AI垂直
    - 科技媒体
    - 国际科技
    - AI研究
    - AI日报
    language: zh
    # 按优先级和类别组织的新闻源
    sources:
      # AI垂直
      - https://www.zhidx.com
      - https://www.leiphone.com
      - https://www.cvmart.net
      - https://www.syncedreview.com
      - https://www.infoq.cn/topic/ai
      # 科技媒体
      - https://36kr.com
      - https://www.huxiu.com
      - https://www.geekpark.net
      - https://www.tmtpost.com
      - https://www.latepost.com
      # 国际科技
      - https://techcrunch.com
      - https://venturebeat.com/ai
      - https://www.theinformation.com
      # AI研究
      - https://openai.com/blog
      - https://deepmind.google/blog
      - https://huggingface.co/blog
      - https://www.anthropic.com/news
      - https://www.deeplearning.ai/the-batch/
      # AI日报
      - https://www.therundown.ai
      - https://tldr.tech/ai
      - https://www.bensbites.co
      # 备选源
      - https://www.ithome.com
      - https://www.paperweekly.site
      - https://artificialintelligence-news.com
      - https://www.technologyreview.com
    # 高优先级源（AI核心和权威媒体）
    priority_sources:
      - https://openai.com/blog
      - https://deepmind.google/blog
      - https://www.anthropic.com/news
      - https://www.therundown.ai
      - https://tldr.tech/ai
      - https://www.bensbites.co
      - https://www.zhidx.com
      - https://36kr.com
      - https://www.theinformation.com
    # 新闻权重配置
    weighting:
      # AI研究源（最高权重）
      research_sources:
        - https://openai.com/blog
        - https://deepmind.google/blog
        - https://huggingface.co/blog
        - https://www.anthropic.com/news
      research_weight: 3.0
      # AI日报（高权重）
      daily_sources:
        - https://www.therundown.ai
        - https://tldr.tech/ai
        - https://www.bensbites.co
      daily_weight: 2.5
      # AI垂直媒体（高权重）
      ai_vertical_sources:
        - https://www.zhidx.com
        - https://www.leiphone.com
        - https://www.cvmart.net
        - https://www.syncedreview.com
      ai_vertical_weight: 2.0
      # 科技媒体（中等权重）
      tech_media_sources:
        - https://36kr.com
        - https://www.huxiu.com
        - https://www.geekpark.net
      tech_media_weight: 1.5
      # 国际科技（中等权重）
      international_sources:
        - https://techcrunch.com
        - https://venturebeat.com/ai
        - https://www.theinformation.com
      international_weight: 1.8
  review:
    auto_save: true
    template: default
  wellness:
    include_diet: true
    include_outfit: true
    temperature_unit: celsius
scheduling:
  enabled: true
  timezone: Asia/Shanghai
  news_su:
    enabled: true
    time: 08:00
  review_su:
    enabled: true
    time: '20:00'
  wellness_su:
    enabled: true
    time: 08:30
storage:
  backup_dir: ./backups
  backup_enabled: false
  backup_retention_days: 30
  data_dir: ./data
user:
  location:
    city: Shanghai
    country: China
    lat: 31.2304
    lon: 121.4737
  name: susu
  timezone: Asia/Shanghai
weather:
  enabled: false
  openweathermap:
    api_key: ''
    units: metric
  provider: openweathermap
  qweather:
    api_key: ''
    units: metric
websearch:
  enabled: true
  max_results: 10
  search_engine: default
  timeout: 30